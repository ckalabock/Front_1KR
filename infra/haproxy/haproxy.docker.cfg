global
    maxconn 256

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option httplog

frontend http_front
    bind *:8080
    default_backend node_backends

backend node_backends
    balance roundrobin
    option httpchk GET /api/health
    http-check expect status 200
    server backend1 backend1:3000 check fall 2 rise 1
    server backend2 backend2:3000 check fall 2 rise 1
    server backend3 backend3:3000 check backup
