services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: front_user
      POSTGRES_PASSWORD: front_password
      POSTGRES_DB: front_1kr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 1234
      MONGO_INITDB_DATABASE: front_1kr
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend1:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      SERVER_ID: backend-1
      POSTGRES_URL: postgres://front_user:front_password@postgres:5432/front_1kr
      MONGO_URL: mongodb://admin:1234@mongo:27017/front_1kr?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis
    ports:
      - "3001:3000"

  backend2:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      SERVER_ID: backend-2
      POSTGRES_URL: postgres://front_user:front_password@postgres:5432/front_1kr
      MONGO_URL: mongodb://admin:1234@mongo:27017/front_1kr?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis
    ports:
      - "3002:3000"

  backend3:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3000
      SERVER_ID: backend-3
      POSTGRES_URL: postgres://front_user:front_password@postgres:5432/front_1kr
      MONGO_URL: mongodb://admin:1234@mongo:27017/front_1kr?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis
    ports:
      - "3003:3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend1
      - backend2
      - backend3
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  mongo_data:
